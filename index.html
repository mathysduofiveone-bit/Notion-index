<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui — Dashboard</title>

<style>

:root {
    --text: #37352F;
    --muted: #787774;
    --card: #F7F6F3;
    --border: #E9E9E7;
    --green: #6B8F71;
    --blue: #5B8DEF;
    --white: #FFFFFF;
    --shadow: rgba(0,0,0,0.06);
}


@media (prefers-color-scheme: dark) {

:root {
    --text: #F7F6F3;
    --muted: #9B9A97;
    --card: #202020;
    --border: #333333;
    --green: #8FB996;
    --blue: #7CA8FF;
    --white: #191919;
    --shadow: rgba(0,0,0,0.3);
}

}


* {
    box-sizing: border-box;
}


body {

    margin:0;

    min-height:100vh;

    background:transparent;

    font-family:
    Inter,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

    color:var(--text);

}


.container {

    width:100%;
    max-width:520px;

    margin:auto;

    padding:30px 20px 50px;

}


/* HEADER */

.header {

    margin-bottom:25px;

}


.greeting {

    font-size:32px;

    font-weight:700;

    letter-spacing:-1px;

}


.date {

    margin-top:5px;

    color:var(--muted);

    font-size:15px;

}


.quote {

    margin-top:18px;

    padding-left:15px;

    border-left:3px solid var(--border);

    color:var(--muted);

    font-size:14px;

    font-style:italic;

}


/* CARDS */

.card {

    background:var(--card);

    border:1px solid var(--border);

    border-radius:18px;

    padding:20px;

    margin-top:16px;

    box-shadow:
    0 8px 25px var(--shadow);

}


.card-title {

    font-size:15px;

    font-weight:650;

    margin-bottom:16px;

}


/* TASKS */


.task {

    display:flex;

    align-items:center;

    gap:12px;

    padding:8px 0;

}


.task input {

    width:18px;

    height:18px;

    accent-color:var(--green);

}


.task label {

    font-size:15px;

}


.progress {

    margin-top:18px;

}


.progress-info {

    display:flex;

    justify-content:space-between;

    color:var(--muted);

    font-size:13px;

    margin-bottom:8px;

}


.progress-bar {

    height:8px;

    background:var(--border);

    border-radius:50px;

    overflow:hidden;

}


.progress-fill {

    height:100%;

    width:0%;

    background:var(--green);

    border-radius:50px;

    transition:.4s ease;

}


/* ENERGY */


.energy {

    text-align:center;

}


.energy-value {

    font-size:28px;

    font-weight:700;

}


.energy-slider {

    width:100%;

    margin-top:15px;

    accent-color:var(--green);

}



/* HABITS */


.habit {

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin:12px 0;

}


.dots {

    display:flex;

    gap:5px;

}


.dot {

    width:10px;

    height:10px;

    border-radius:50%;

    background:var(--border);

}


.dot.active {

    background:var(--green);

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<div class="greeting">
☀️ Aujourd'hui
</div>


<div class="date" id="date">
</div>


<div class="quote" id="quote">
</div>


</div>


<!-- PRIORITES -->


<div class="card">


<div class="card-title">
🎯 Priorités
</div>


<div class="task">
<input type="checkbox" class="taskCheck">
<label>Priorité numéro 1</label>
</div>


<div class="task">
<input type="checkbox" class="taskCheck">
<label>Priorité numéro 2</label>
</div>


<div class="task">
<input type="checkbox" class="taskCheck">
<label>Priorité numéro 3</label>
</div>


<div class="progress">


<div class="progress-info">

<span>Progression</span>

<span id="progressText">
0%
</span>

</div>


<div class="progress-bar">

<div class="progress-fill" id="progressFill"></div>

</div>


</div>


</div>
<!-- ENERGIE -->

<div class="card">

<div class="card-title">
⚡ Mon énergie
</div>


<div class="energy">

<div class="energy-value" id="energyValue">
7 / 10
</div>


<input 
type="range"
min="1"
max="10"
value="7"
class="energy-slider"
id="energySlider">


</div>

</div>



<!-- HABITUDES -->


<div class="card">


<div class="card-title">
🔥 Habitudes
</div>


<div class="habit">

<span>
📚 Lecture
</span>

<div class="dots">

<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

</div>



<div class="habit">

<span>
🧘 Respiration
</span>

<div class="dots">

<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot active"></span>

</div>

</div>



<div class="habit">

<span>
🏃 Mouvement
</span>

<div class="dots">

<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

</div>



<div class="habit">

<span>
💧 Hydratation
</span>

<div class="dots">

<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>

</div>

</div>


</div>



<!-- FOCUS -->


<div class="card">


<div class="card-title">
🧠 Focus
</div>


<div style="
text-align:center;
">


<div id="focusTime"
style="
font-size:42px;
font-weight:700;
letter-spacing:-2px;
">
25:00
</div>



<button 
id="focusButton"
style="
margin-top:18px;
border:none;
padding:12px 22px;
border-radius:14px;
background:var(--blue);
color:white;
font-size:15px;
cursor:pointer;
">

▶ Commencer

</button>


</div>


</div>



<!-- JOURNAL -->


<div class="card">


<div class="card-title">
✍️ Une pensée
</div>


<textarea
id="journal"
placeholder="Comment s'est passée ta journée ?"
style="
width:100%;
height:90px;
resize:none;
border:none;
outline:none;
background:transparent;
font-family:inherit;
font-size:15px;
color:var(--text);
">
</textarea>


</div>



<!-- RESPIRATION PLACEHOLDER -->


<div class="card">


<div class="card-title">
🌿 Pause respiration
</div>


<div style="
text-align:center;
padding:20px;
color:var(--muted);
">

L'orbe de respiration arrive dans la dernière partie...

</div>


</div>



<script>


// DATE

const dateElement =
document.getElementById("date");


const today =
new Date();


dateElement.innerText =
today.toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);



// CITATIONS

const quotes=[

"Chaque petit pas compte.",

"La constance crée les grands changements.",

"Fais moins, mais mieux.",

"Une journée intentionnelle commence par une intention claire.",

"Avancer lentement reste avancer."

];


document.getElementById("quote").innerText =
"“"+
quotes[
Math.floor(
Math.random()*quotes.length
)
]
+"”";



// PROGRESSION TACHES


const tasks =
document.querySelectorAll(".taskCheck");


const progressFill =
document.getElementById("progressFill");


const progressText =
document.getElementById("progressText");


function updateProgress(){

let done=0;


tasks.forEach(t=>{

if(t.checked)
done++;

});


let value =
Math.round(
done/tasks.length*100
);


progressFill.style.width =
value+"%";


progressText.innerText =
value+"%";

}



tasks.forEach(t=>{

t.addEventListener(
"change",
updateProgress
);

});




// ENERGIE


const slider =
document.getElementById("energySlider");


const energyValue =
document.getElementById("energyValue");


slider.addEventListener(
"input",
()=>{

energyValue.innerText =
slider.value+" / 10";

}

);



// JOURNAL SAUVEGARDE


const journal =
document.getElementById("journal");


journal.value =
localStorage.getItem(
"dailyJournal"
)
|| "";


journal.addEventListener(
"input",
()=>{

localStorage.setItem(
"dailyJournal",
journal.value
);

});



</script>
<style>


.breath-container {

display:flex;
flex-direction:column;
align-items:center;

padding:20px;

}


.breath-orb {

width:150px;
height:150px;

border-radius:50%;

background:

radial-gradient(
circle at 30% 30%,
rgba(255,255,255,.7),
transparent 35%
),

linear-gradient(
135deg,
#8FB996,
#6B8F71
);


box-shadow:

0 0 40px rgba(107,143,113,.25);


transform:scale(.8);

transition:
transform 4s ease-in-out;


}


.breath-text {

margin-top:25px;

font-size:24px;

font-weight:700;

}


.breath-time {

margin-top:8px;

color:var(--muted);

}



.breath-button {

margin-top:20px;

border:none;

padding:12px 24px;

border-radius:14px;

background:var(--green);

color:white;

font-size:15px;

cursor:pointer;

}



</style>



<script>


// REMPLACE LE PLACEHOLDER RESPIRATION


const breathCard =
document.querySelector(
".card:last-of-type"
);



breathCard.innerHTML = `

<div class="card-title">
🌿 Respiration
</div>


<div class="breath-container">


<div
class="breath-orb"
id="breathOrb">
</div>


<div
class="breath-text"
id="breathText">
Prêt ?
</div>


<div
class="breath-time"
id="breathTime">
4 secondes
</div>


<button
class="breath-button"
id="breathButton">

▶ Commencer

</button>


</div>

`;



// RESPIRATION 4-4-4-4


const breathPhases=[

{
name:"Inspirez",
duration:4,
scale:1.25
},

{
name:"Retenez",
duration:4,
scale:1.25
},

{
name:"Expirez",
duration:4,
scale:.8
},

{
name:"Retenez",
duration:4,
scale:.8
}

];


let breathIndex=0;

let breathSeconds=
breathPhases[0].duration;


let breathing=false;



const breathOrb =
document.getElementById(
"breathOrb"
);


const breathText =
document.getElementById(
"breathText"
);


const breathTime =
document.getElementById(
"breathTime"
);


const breathButton =
document.getElementById(
"breathButton"
);



function renderBreath(){


let phase =
breathPhases[
breathIndex
];


breathText.innerText =
phase.name;


breathTime.innerText =
breathSeconds+" secondes";


breathOrb.style.transform =
"scale("+phase.scale+")";


}



function breathTick(){


if(!breathing)
return;



breathSeconds--;



if(breathSeconds<0){


breathIndex =
(breathIndex+1)
%
breathPhases.length;


breathSeconds =
breathPhases[
breathIndex
].duration;


}


renderBreath();


}



setInterval(
breathTick,
1000
);



breathButton.onclick =
()=>{


breathing =
!breathing;



if(breathing){


breathButton.innerText =
"⏸ Pause";


renderBreath();


}

else{


breathButton.innerText =
"▶ Commencer";


breathOrb.style.transform =
"scale(.8)";


}

};



// FOCUS TIMER


let focusSeconds =
25*60;


let focusRunning=false;


const focusTime =
document.getElementById(
"focusTime"
);


const focusButton =
document.getElementById(
"focusButton"
);



function displayFocus(){


let min =
Math.floor(
focusSeconds/60
);


let sec =
focusSeconds%60;


focusTime.innerText =
min+":"+
(sec<10?"0":"")+
sec;


}



setInterval(()=>{


if(
focusRunning &&
focusSeconds>0
){

focusSeconds--;

displayFocus();

}


},1000);



focusButton.onclick =
()=>{


focusRunning =
!focusRunning;



focusButton.innerText =
focusRunning
?
"⏸ Pause"
:
"▶ Commencer";


};



// SAUVEGARDE CHECKBOX


tasks.forEach(
(t,i)=>{


let saved =
localStorage.getItem(
"task_"+i
);


if(saved==="true")
t.checked=true;


t.addEventListener(
"change",
()=>{


localStorage.setItem(
"task_"+i,
t.checked
);


updateProgress();


});


});


updateProgress();



</script>


</body>

</html>
