
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui</title>


<style>

:root{

--text:#37352F;
--muted:#787774;

--card:#F7F6F3;
--border:#E9E9E7;

--green:#7A9E7E;
--blue:#5B8DEF;

}



@media(prefers-color-scheme:dark){

:root{

--text:#F1F1EF;
--muted:#9B9A97;

--card:#202020;
--border:#333;

}

}



*{

box-sizing:border-box;

}



body{

margin:0;

background:transparent;

font-family:

Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:var(--text);

}



.container{

max-width:430px;

margin:auto;

padding:20px 12px 35px;

}




/* HEADER */


.title{

font-size:28px;

font-weight:800;

letter-spacing:-1px;

}



.header-info{

display:flex;

justify-content:space-between;

margin-top:8px;

font-size:13px;

color:var(--muted);

}






/* TAB BAR */


.tabs{

display:flex;

gap:5px;

padding:4px;

background:var(--card);

border:1px solid var(--border);

border-radius:14px;

margin-top:15px;

}



.tab{

flex:1;

border:none;

background:transparent;

border-radius:10px;

padding:9px 5px;


font-size:12px;

color:var(--muted);

cursor:pointer;

}



.tab.active{

background:white;

color:var(--text);

box-shadow:

0 2px 8px rgba(0,0,0,.08);

}



@media(prefers-color-scheme:dark){

.tab.active{

background:#333;

}

}





/* WIDGETS */


.widget{

margin-top:12px;

animation:

fadeIn .25s ease;

}



.hidden{

display:none;

}



@keyframes fadeIn{

from{

opacity:0;

transform:translateY(8px);

}


to{

opacity:1;

transform:none;

}

}



.card{

background:var(--card);

border:1px solid var(--border);

border-radius:18px;

padding:18px;

}



.card-title{

font-size:14px;

font-weight:700;

margin-bottom:18px;

}




/* ENERGY */


.energy{

text-align:center;

}



.energy-ring{

width:130px;

height:130px;

border-radius:50%;


margin:auto;


display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--green) 70%,
var(--border) 0
);


transition:.4s;

}



.energy-inner{

width:100px;

height:100px;

border-radius:50%;


background:var(--card);


display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

}



.energy-score{

font-size:34px;

font-weight:800;

}



.energy-max{

font-size:12px;

color:var(--muted);

}



.energy-message{

font-size:13px;

color:var(--muted);

margin-top:10px;

}



.energy-slider{

width:100%;

height:7px;

margin-top:20px;

appearance:none;

border-radius:20px;


background:

linear-gradient(
90deg,
#94B49F,
#D4A72C,
#E07A5F
);

}



.energy-slider::-webkit-slider-thumb{

appearance:none;

width:21px;

height:21px;

border-radius:50%;


background:white;

border:3px solid var(--green);

cursor:pointer;

}



.energy-labels{

display:flex;

justify-content:space-between;

font-size:12px;

color:var(--muted);

margin-top:8px;

}


</style>

</head>


<body>


<div class="container">



<div class="title">

☀️ Aujourd'hui

</div>



<div class="header-info">


<div id="date">

Mercredi 22 juillet

</div>


<div>

☀️ 24°C

</div>


</div>






<!-- NAVIGATION -->


<div class="tabs">


<button

class="tab active"

id="energyTab"

>

⚡ Énergie

</button>



<button

class="tab"

id="wisdomTab"

>

✨ Sagesse

</button>



<button

class="tab"

id="focusTab"

>

🧠 Focus

</button>


</div>







<!-- ENERGY WIDGET -->


<div

class="widget"

id="energyWidget"

>


<div class="card">


<div class="card-title">

⚡ Mon énergie

</div>


<div class="energy">


<div

class="energy-ring"

id="energyRing"

>


<div class="energy-inner">


<div

class="energy-score"

id="energyScore"

>

7

</div>


<div class="energy-max">

/10

</div>


</div>


</div>



<div

class="energy-message"

id="energyMessage"

>

✨ Bonne dynamique

</div>



<input

type="range"

min="1"

max="10"

value="7"

id="energySlider"

class="energy-slider"

>



<div class="energy-labels">


<span>🌙 Repos</span>

<span>🌿 Équilibre</span>

<span>🔥 Forme</span>


</div>


</div>


</div>


</div>




<!-- SUITE PARTIE 2 -->




<!-- WISDOM WIDGET -->


<div

class="widget hidden"

id="wisdomWidget"

>


<div class="card">


<div class="card-title">

✨ Sphère de sagesse

</div>



<div class="wisdom-container">



<div class="wisdom-sphere">


<div class="sphere-light">

</div>


</div>



<div

class="wisdom-text"

id="wisdomText"

>

"La simplicité est la sophistication suprême."

</div>



<div

class="wisdom-author"

id="wisdomAuthor"

>

— Léonard de Vinci

</div>



<button

class="secondary-button"

id="newWisdom"

>

Nouvelle inspiration

</button>



</div>


</div>


</div>








<!-- FOCUS WIDGET -->


<div

class="widget hidden"

id="focusWidget"

>


<div class="card">


<div class="card-title">

🧠 Focus

</div>



<div class="focus-container">



<div

class="focus-ring"

id="focusRing"

>


<div class="focus-inner">


<div

class="focus-time"

id="focusTime"

>

25:00

</div>


</div>


</div>




<div class="focus-label">

Session profonde

</div>




<div class="focus-buttons">


<button

class="primary-button"

id="focusStart"

>

▶ Démarrer

</button>



<button

class="secondary-button"

id="focusReset"

>

↺ Recommencer

</button>


</div>


</div>


</div>


</div>







<style>



/* BUTTONS */


button{

border:none;

cursor:pointer;

font-size:13px;

border-radius:12px;

padding:10px 16px;

}



.primary-button{

background:var(--blue);

color:white;

}



.secondary-button{

background:var(--border);

color:var(--text);

}





/* SAGESSE */


.wisdom-container{

text-align:center;

}



.wisdom-sphere{


width:120px;

height:120px;


margin:8px auto 20px;


border-radius:50%;



background:

radial-gradient(
circle at 30% 25%,
white,
#f4f4f4,
#dedede
);



box-shadow:


0 0 25px rgba(255,255,255,.9),

0 10px 25px rgba(0,0,0,.08);



position:relative;


animation:

floatSphere 5s infinite ease-in-out;


}



.sphere-light{


position:absolute;


width:32px;

height:32px;


top:20px;

left:28px;


border-radius:50%;


background:white;


filter:blur(5px);


opacity:.8;


}



@keyframes floatSphere{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-8px);

}


}



.wisdom-text{

font-size:14px;

line-height:1.5;

}



.wisdom-author{

margin-top:8px;

margin-bottom:16px;

font-size:12px;

color:var(--muted);

}







/* FOCUS */


.focus-container{

text-align:center;

}



.focus-ring{


width:150px;

height:150px;


margin:auto;


border-radius:50%;


display:flex;

align-items:center;

justify-content:center;



background:

conic-gradient(
var(--blue)
0deg,
var(--border)
0
);


transition:.4s;


}



.focus-inner{


width:120px;

height:120px;


border-radius:50%;


background:var(--card);


display:flex;

align-items:center;

justify-content:center;


}



.focus-time{

font-size:28px;

font-weight:800;

}



.focus-label{

margin-top:12px;

font-size:13px;

color:var(--muted);

}



.focus-buttons{


display:flex;

justify-content:center;


gap:10px;


margin-top:18px;


}



</style>





<!-- SUITE PARTIE 3 -->

<script>


// DATE


document.getElementById("date").innerText =

new Date().toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);







// NAVIGATION ENTRE WIDGETS


const tabs = [

{
button:
"energyTab",

widget:
"energyWidget"

},

{
button:
"wisdomTab",

widget:
"wisdomWidget"

},

{
button:
"focusTab",

widget:
"focusWidget"

}

];



tabs.forEach(item=>{


document
.getElementById(item.button)
.onclick = ()=>{


tabs.forEach(other=>{


document
.getElementById(other.widget)
.classList.add(
"hidden"
);



document
.getElementById(other.button)
.classList.remove(
"active"
);



});



document
.getElementById(item.widget)
.classList.remove(
"hidden"
);



document
.getElementById(item.button)
.classList.add(
"active"
);



};



});









// ENERGIE


const energySlider =
document.getElementById(
"energySlider"
);


const energyScore =
document.getElementById(
"energyScore"
);


const energyRing =
document.getElementById(
"energyRing"
);


const energyMessage =
document.getElementById(
"energyMessage"
);





function updateEnergy(){


const value =
Number(
energySlider.value
);



energyScore.innerText =
value;



energyRing.style.background =

`
conic-gradient(
var(--green)
${value*10}%,
var(--border)
0
)
`;



if(value<=3){

energyMessage.innerText =
"🌙 Besoin de repos";

}

else if(value<=6){

energyMessage.innerText =
"🌿 Énergie stable";

}

else if(value<=8){

energyMessage.innerText =
"✨ Bonne dynamique";

}

else{

energyMessage.innerText =
"🔥 Pleine forme";

}



localStorage.setItem(
"energy",
value
);



}



energySlider.value =

localStorage.getItem(
"energy"
)
||7;



energySlider.addEventListener(
"input",
updateEnergy
);



updateEnergy();










// FOCUS TIMER



let focusTotal =
25*60;


let focusSeconds =
focusTotal;


let focusRunning =
false;




const focusTime =
document.getElementById(
"focusTime"
);


const focusRing =
document.getElementById(
"focusRing"
);



const focusStart =
document.getElementById(
"focusStart"
);


const focusReset =
document.getElementById(
"focusReset"
);






function updateFocus(){


const minutes =
Math.floor(
focusSeconds/60
);



const seconds =
focusSeconds%60;



focusTime.innerText =

minutes
+
":"
+
(seconds<10?"0":"")
+
seconds;



const progress =

(
(focusTotal-focusSeconds)
/
focusTotal
)
*
360;



focusRing.style.background =

`
conic-gradient(
var(--blue)
${progress}deg,
var(--border)
0
)
`;



}



setInterval(()=>{


if(
focusRunning &&
focusSeconds>0
){

focusSeconds--;

updateFocus();

}


},1000);





focusStart.onclick = ()=>{


focusRunning =
!focusRunning;



focusStart.innerText =

focusRunning

?

"⏸ Pause"

:

"▶ Démarrer";


};





focusReset.onclick = ()=>{


focusRunning=false;


focusSeconds=focusTotal;


focusStart.innerText =
"▶ Démarrer";


updateFocus();


};



updateFocus();











// CITATIONS SPHERE


const quotes = [


[
"La simplicité est la sophistication suprême.",
"— Léonard de Vinci"
],


[
"La discipline est le pont entre les objectifs et les accomplissements.",
"— Jim Rohn"
],


[
"La meilleure façon de prédire l'avenir est de le créer.",
"— Peter Drucker"
],


[
"Nous sommes ce que nous faisons de manière répétée.",
"— Aristote"
],


[
"Le voyage de mille kilomètres commence par un premier pas.",
"— Lao Tseu"
]


];




const wisdomText =
document.getElementById(
"wisdomText"
);


const wisdomAuthor =
document.getElementById(
"wisdomAuthor"
);



document
.getElementById(
"newWisdom"
)
.onclick = ()=>{


const quote =

quotes[
Math.floor(
Math.random()
*
quotes.length
)
];



wisdomText.style.opacity=0;



setTimeout(()=>{


wisdomText.innerText =
"“"
+
quote[0]
+
"”";


wisdomAuthor.innerText =
quote[1];



wisdomText.style.opacity=1;



},250);



};



</script>


</body>


</html>
