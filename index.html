<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Respiration</title>

<style>

:root{
    --bg:#ffffff;
    --text:#37352F;
    --muted:#9B9A97;
    --ring:#E9E9E7;
    --orb:#2F80ED;
    --shadow:rgba(47,128,237,.18);
}

@media (prefers-color-scheme: dark){

:root{
    --bg:#191919;
    --text:#f3f3f3;
    --muted:#9f9f9f;
    --ring:#2B2B2B;
    --orb:#4EA1FF;
    --shadow:rgba(78,161,255,.22);
}

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:transparent;
font-family:Inter,system-ui,sans-serif;

display:flex;
align-items:center;
justify-content:center;

height:100vh;

color:var(--text);

}

.card{

width:340px;
padding:30px;

display:flex;
flex-direction:column;
align-items:center;

}

.orb{

width:170px;
height:170px;

border-radius:50%;

background:
radial-gradient(circle at 30% 30%,
#ffffffaa,
transparent 40%),
var(--orb);

box-shadow:

0 0 0 1px rgba(0,0,0,.04),
0 20px 50px var(--shadow);

transition:transform linear;

}

.phase{

margin-top:36px;

font-size:30px;
font-weight:700;

}

.timer{

margin-top:8px;

font-size:16px;

color:var(--muted);

}

.progress{

margin-top:28px;

width:100%;
height:8px;

background:var(--ring);

border-radius:999px;

overflow:hidden;

}

.bar{

height:100%;

width:0;

background:var(--orb);

transition:width linear;

}

.controls{

margin-top:30px;

display:flex;
gap:12px;

}

button{

border:none;

padding:10px 18px;

border-radius:12px;

background:var(--text);

color:white;

cursor:pointer;

font-size:15px;

}

button.secondary{

background:var(--ring);

color:var(--text);

}

.footer{

margin-top:24px;

font-size:13px;

color:var(--muted);

}

</style>

</head>

<body>

<div class="card">

<div class="orb" id="orb"></div>

<div class="phase" id="phase">
Inspirez
</div>

<div class="timer" id="timer">
4 s
</div>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<div class="controls">

<button onclick="toggle()">
▶︎ Pause
</button>

<button class="secondary" onclick="restart()">
↺ Recommencer
</button>

</div>

<div class="footer">
Cycle 4 • 4 • 4 • 4
</div>

</div>

<script>

const phases=[
{name:"Inspirez",duration:4,scale:1.18},
{name:"Retenez",duration:4,scale:1.18},
{name:"Expirez",duration:4,scale:0.88},
{name:"Retenez",duration:4,scale:0.88}
];

let phase=0;
let remaining=phases[0].duration;
let paused=false;

const orb=document.getElementById("orb");
const phaseText=document.getElementById("phase");
const timer=document.getElementById("timer");
const bar=document.getElementById("bar");

function render(){

let p=phases[phase];

phaseText.innerText=p.name;

timer.innerText=remaining+" s";

orb.style.transitionDuration="1s";

orb.style.transform="scale("+p.scale+")";

bar.style.transition="width 1s linear";

bar.style.width=((p.duration-remaining)/p.duration*100)+"%";

}

function tick(){

if(paused)return;

remaining--;

if(remaining<0){

phase=(phase+1)%phases.length;

remaining=phases[phase].duration;

bar.style.transition="none";

bar.style.width="0%";

setTimeout(()=>{

bar.style.transition="width 1s linear";

},30);

}

render();

}

function restart(){

phase=0;

remaining=phases[0].duration;

paused=false;

render();

}

function toggle(){

paused=!paused;

}

render();

setInterval(tick,1000);

</script>

</body>
</html>
