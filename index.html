<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui — Life Dashboard</title>


<style>


:root {

--text:#37352F;
--muted:#787774;

--card:#F7F6F3;
--border:#E9E9E7;

--green:#7A9E7E;
--blue:#5B8DEF;
--gold:#D4A72C;

--shadow:
rgba(0,0,0,0.04);

}


@media(prefers-color-scheme:dark){

:root{

--text:#F1F1EF;
--muted:#9B9A97;

--card:#202020;
--border:#333333;

--green:#94B49F;
--blue:#7CA8FF;

--shadow:
rgba(0,0,0,.25);

}

}



*{

box-sizing:border-box;

}



body{

margin:0;

background:transparent;

font-family:

Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;


color:var(--text);

}



.container{

max-width:520px;

margin:auto;

padding:35px 20px 60px;

}



/* HEADER */


.header{

margin-bottom:30px;

}


.title{

font-size:34px;

font-weight:750;

letter-spacing:-1.5px;

}



.date{

margin-top:8px;

color:var(--muted);

font-size:15px;

}



.quote{

margin-top:20px;

padding-left:16px;

border-left:
3px solid var(--border);

font-size:14px;

color:var(--muted);

font-style:italic;

line-height:1.5;

}



/* CARDS */


.card{

background:var(--card);

border:1px solid var(--border);

border-radius:22px;

padding:22px;

margin-bottom:18px;


box-shadow:
0 10px 30px var(--shadow);


}



.card-title{

font-size:15px;

font-weight:700;

margin-bottom:20px;

}



/* ENERGY */


.energy-box{

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

}



.energy-circle{

width:130px;

height:130px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--green) 70%,
var(--border) 0
);


transition:.5s;


}



.energy-inner{

width:100px;

height:100px;

border-radius:50%;

background:var(--card);

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

}



.energy-number{

font-size:32px;

font-weight:750;

}



.energy-label{

font-size:13px;

color:var(--muted);

}



.energy-range{

width:100%;

margin-top:22px;

accent-color:var(--green);

}



/* REMINDERS */


.reminder{

display:flex;

align-items:center;

justify-content:space-between;

padding:12px 0;

border-bottom:
1px solid var(--border);

}



.reminder:last-child{

border-bottom:none;

}



.reminder-left{

display:flex;

align-items:center;

gap:10px;

}



.reminder input{

width:18px;

height:18px;

accent-color:var(--green);

}



/* FOCUS */


.focus-circle{

width:170px;

height:170px;

margin:auto;


border-radius:50%;


display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--blue) 0deg,
var(--border) 0deg
);


}



.focus-inner{

width:135px;

height:135px;

background:var(--card);

border-radius:50%;


display:flex;

align-items:center;

justify-content:center;

font-size:30px;

font-weight:700;

}



.buttons{

display:flex;

gap:10px;

justify-content:center;

margin-top:22px;

}



button{

border:none;

border-radius:14px;

padding:12px 18px;

cursor:pointer;

font-size:14px;

}



.primary{

background:var(--blue);

color:white;

}



.secondary{

background:var(--border);

color:var(--text);

}



/* SPHERE */


.sphere-box{

text-align:center;

}



.sphere{


width:120px;

height:120px;

margin:10px auto 25px;


border-radius:50%;


background:

radial-gradient(
circle at 30% 30%,
white,
transparent 25%
),

linear-gradient(
135deg,
#B8D8BA,
#7A9E7E
);



box-shadow:

0 0 45px rgba(122,158,126,.35);


animation:

float 4s ease-in-out infinite;


}



@keyframes float{

0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-12px);

}

}



.inspiration{

font-size:15px;

line-height:1.5;

}



.author{

margin-top:10px;

font-size:13px;

color:var(--muted);

}



textarea{

width:100%;

height:120px;

resize:none;

border:none;

outline:none;

background:transparent;

font-family:inherit;

font-size:15px;

color:var(--text);

}


</style>


</head>


<body>


<div class="container">


<div class="header">


<div class="title">

☀️ Aujourd'hui

</div>


<div class="date" id="date">

</div>


<div class="quote" id="quote">

</div>


</div>


<!-- LA SUITE ARRIVE PARTIE 2 -->

<!-- ENERGIE -->


<div class="card">


<div class="card-title">

⚡ Mon énergie

</div>


<div class="energy-box">


<div class="energy-circle" id="energyCircle">


<div class="energy-inner">


<div class="energy-number" id="energyNumber">

7

</div>


<div class="energy-label">

/ 10

</div>


</div>


</div>



<div 
id="energyMessage"
style="
margin-top:15px;
color:var(--muted);
font-size:14px;
">

Bonne dynamique

</div>


<input
type="range"
min="1"
max="10"
value="7"
id="energyRange"
class="energy-range"
>


</div>


</div>



<!-- RAPPELS -->


<div class="card">


<div class="card-title">

🌱 Petits rappels

</div>



<div class="reminder">


<div class="reminder-left">

<input 
type="checkbox"
class="dailyReminder"
data-name="Boire de l'eau"
>

<span>
💧 Boire de l'eau
</span>

</div>


</div>



<div class="reminder">


<div class="reminder-left">

<input 
type="checkbox"
class="dailyReminder"
data-name="Lire"
>

<span>
📖 Lire quelques pages
</span>

</div>


</div>



<div class="reminder">


<div class="reminder-left">

<input 
type="checkbox"
class="dailyReminder"
data-name="Bouger"
>

<span>
🚶 Bouger un peu
</span>

</div>


</div>



<div class="reminder">


<div class="reminder-left">

<input 
type="checkbox"
class="dailyReminder"
data-name="Habitudes"
>

<span>
✍️ Remplir mes habitudes
</span>

</div>


</div>


</div>





<!-- FOCUS -->


<div class="card">


<div class="card-title">

🧠 Focus

</div>


<div class="focus-circle" id="focusCircle">


<div class="focus-inner" id="focusTime">

25:00

</div>


</div>



<div
style="
text-align:center;
margin-top:15px;
color:var(--muted);
font-size:14px;
">

Session profonde

</div>



<div class="buttons">


<button 
class="primary"
id="focusStart"
>

▶ Démarrer

</button>


<button
class="secondary"
id="focusReset"
>

↺ Recommencer

</button>


</div>


</div>





<!-- JOURNAL -->


<div class="card">


<div class="card-title">

✍️ Moment du jour

</div>



<textarea
id="journal"
placeholder="Une pensée, une victoire, une chose à retenir..."
></textarea>


</div>





<!-- SPHERE -->



<div class="card">


<div class="card-title">

✨ Sphère de sagesse

</div>



<div class="sphere-box">


<div class="sphere">

</div>


<div 
class="inspiration"
id="inspiration"
>

"La simplicité est la sophistication suprême."

</div>


<div 
class="author"
id="author"
>

— Léonard de Vinci

</div>



<button
class="secondary"
style="
margin-top:20px;
"
id="newQuote"
>

Nouvelle inspiration

</button>



</div>


</div>


<!-- JAVASCRIPT ARRIVE PARTIE 3 -->

<script>


// DATE


const date =
document.getElementById("date");


date.innerText =
new Date().toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);



// CITATION DU HAUT


const dailyQuotes = [

"Chaque petit pas compte.",

"La discipline crée la liberté.",

"Ce que tu fais chaque jour construit qui tu deviens.",

"Le calme est une forme de puissance.",

"Commence là où tu es. Utilise ce que tu as.",

"La simplicité est la clé de la maîtrise."

];


document.getElementById("quote").innerText =
"“"+
dailyQuotes[
Math.floor(
Math.random()*dailyQuotes.length
)
]
+"”";




// ENERGIE


const energyRange =
document.getElementById(
"energyRange"
);


const energyNumber =
document.getElementById(
"energyNumber"
);


const energyCircle =
document.getElementById(
"energyCircle"
);


const energyMessage =
document.getElementById(
"energyMessage"
);



function updateEnergy(){


let value =
energyRange.value;



energyNumber.innerText =
value;



let percent =
value*10;



energyCircle.style.background =
`
conic-gradient(
var(--green)
${percent}%,
var(--border)
0
)
`;



if(value<=3){

energyMessage.innerText =
"🌙 Besoin de repos";

}

else if(value<=6){

energyMessage.innerText =
"🌿 Énergie stable";

}

else if(value<=8){

energyMessage.innerText =
"✨ Bonne dynamique";

}

else{

energyMessage.innerText =
"🔥 Pleine énergie";

}



localStorage.setItem(
"energy",
value
);


}



energyRange.value =
localStorage.getItem("energy")
|| 7;


energyRange.addEventListener(
"input",
updateEnergy
);


updateEnergy();





// RAPPELS


const reminders =
document.querySelectorAll(
".dailyReminder"
);



reminders.forEach(
(item,index)=>{


item.checked =
localStorage.getItem(
"reminder_"+index
)
==="true";



item.addEventListener(
"change",
()=>{


localStorage.setItem(
"reminder_"+index,
item.checked
);


});



});





// JOURNAL


const journal =
document.getElementById(
"journal"
);


journal.value =
localStorage.getItem(
"journal"
)
|| "";



journal.addEventListener(
"input",
()=>{


localStorage.setItem(
"journal",
journal.value
);


});





// FOCUS TIMER


let focusSeconds =
25*60;


let focusRunning =
false;



const focusTime =
document.getElementById(
"focusTime"
);


const focusStart =
document.getElementById(
"focusStart"
);


const focusReset =
document.getElementById(
"focusReset"
);


const focusCircle =
document.getElementById(
"focusCircle"
);



function updateFocus(){


let minutes =
Math.floor(
focusSeconds/60
);


let seconds =
focusSeconds%60;



focusTime.innerText =
minutes+
":"+
(seconds<10?"0":"")+
seconds;



let progress =
((25*60-focusSeconds)/(25*60))*360;



focusCircle.style.background =
`
conic-gradient(
var(--blue)
${progress}deg,
var(--border)
0
)
`;



}



focusStart.onclick =
()=>{


focusRunning =
!focusRunning;



focusStart.innerText =
focusRunning
?
"⏸ Pause"
:
"▶ Démarrer";


};



focusReset.onclick =
()=>{


focusRunning=false;

focusSeconds =
25*60;


focusStart.innerText =
"▶ Démarrer";


updateFocus();


};



setInterval(
()=>{


if(
focusRunning &&
focusSeconds>0
){


focusSeconds--;


updateFocus();


}



},
1000
);



updateFocus();





// SPHERE DE SAGESSE


const inspirations=[


{
text:
"La seule façon de faire du bon travail est d'aimer ce que vous faites.",
author:
"— Steve Jobs"
},


{
text:
"Ce n'est pas la montagne que nous conquérons, mais nous-mêmes.",
author:
"— Edmund Hillary"
},


{
text:
"Nous sommes ce que nous faisons de manière répétée.",
author:
"— Aristote"
},


{
text:
"Le succès est la somme de petits efforts répétés jour après jour.",
author:
"— Robert Collier"
},


{
text:
"La vie est vraiment simple, mais nous insistons à la rendre compliquée.",
author:
"— Confucius"
}


];



const inspiration =
document.getElementById(
"inspiration"
);


const author =
document.getElementById(
"author"
);



document.getElementById(
"newQuote"
)
.onclick =
()=>{


let quote =
inspirations[
Math.floor(
Math.random()
*
inspirations.length
)
];


inspiration.style.opacity=0;


setTimeout(
()=>{


inspiration.innerText =
"“"+
quote.text+
"”";


author.innerText =
quote.author;


inspiration.style.opacity=1;


},
300
);


};





</script>


</body>

</html>
