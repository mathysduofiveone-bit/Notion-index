
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui</title>


<style>

:root{

--text:#37352F;
--muted:#787774;

--card:#F7F6F3;
--border:#E9E9E7;

--green:#7A9E7E;
--blue:#5B8DEF;

}


@media(prefers-color-scheme:dark){

:root{

--text:#F1F1EF;
--muted:#9B9A97;

--card:#202020;
--border:#333;

}

}



*{

box-sizing:border-box;

}



body{

margin:0;

background:transparent;

font-family:

Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:var(--text);

}



.container{

max-width:430px;

margin:auto;

padding:20px 12px 35px;

}



/* HEADER */


.title{

font-size:28px;

font-weight:800;

letter-spacing:-1.2px;

}



.header-info{

display:flex;

justify-content:space-between;

margin-top:8px;

font-size:13px;

color:var(--muted);

}





/* CARD */


.card{

background:var(--card);

border:1px solid var(--border);

border-radius:18px;

padding:16px;

margin-top:12px;

}



.card-title{

font-size:14px;

font-weight:700;

margin-bottom:15px;

}





/* ENERGIE */


.energy{

text-align:center;

}



.energy-ring{

width:125px;

height:125px;

border-radius:50%;


margin:auto;


display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--green) 70%,
var(--border) 0
);


transition:.4s;

}



.energy-inner{

width:98px;

height:98px;

border-radius:50%;


background:var(--card);


display:flex;

flex-direction:column;

align-items:center;

justify-content:center;


}



.energy-score{

font-size:32px;

font-weight:800;

}



.energy-max{

font-size:12px;

color:var(--muted);

}



.energy-message{

margin-top:8px;

font-size:13px;

color:var(--muted);

}



.energy-slider{

width:100%;

margin-top:18px;

height:6px;

appearance:none;

border-radius:30px;


background:

linear-gradient(
90deg,
#94B49F,
#D4A72C,
#E07A5F
);


}



.energy-slider::-webkit-slider-thumb{

appearance:none;

width:20px;

height:20px;

border-radius:50%;


background:white;


border:

3px solid var(--green);


cursor:pointer;

}



.energy-labels{

display:flex;

justify-content:space-between;

font-size:11px;

color:var(--muted);

margin-top:8px;

}



</style>


</head>


<body>


<div class="container">



<div class="title">

☀️ Aujourd'hui

</div>



<div class="header-info">


<div id="date">

Mercredi 22 juillet

</div>


<div>

☀️ 24°C

</div>


</div>






<!-- ENERGIE FIXE -->


<div class="card">


<div class="card-title">

⚡ Mon énergie

</div>


<div class="energy">



<div

class="energy-ring"

id="energyRing"

>


<div class="energy-inner">


<div

class="energy-score"

id="energyScore"

>

7

</div>


<div class="energy-max">

/10

</div>


</div>


</div>



<div

class="energy-message"

id="energyMessage"

>

✨ Bonne dynamique

</div>




<input

type="range"

min="1"

max="10"

value="7"

id="energySlider"

class="energy-slider"

>



<div class="energy-labels">


<span>

🌙

</span>


<span>

🌿

</span>


<span>

🔥

</span>


</div>


</div>


</div>





<!-- ONGLET + CONTENU ARRIVENT PARTIE 2 -->

<!-- ONGLET -->


<div class="tabs">


<button

class="tab active"

id="wisdomTab"

>

✨ Sagesse

</button>



<button

class="tab"

id="focusTab"

>

🧠 Focus

</button>


</div>





<!-- SAGESSE -->


<div

class="tab-content"

id="wisdomContent"

>


<div class="card">


<div class="wisdom-container">



<div class="wisdom-sphere">


<div class="sphere-light">

</div>


</div>



<div

class="wisdom-text"

id="wisdomText"

>

"La simplicité est la sophistication suprême."

</div>



<div

class="wisdom-author"

id="wisdomAuthor"

>

— Léonard de Vinci

</div>



<button

class="secondary-button"

id="newWisdom"

>

Nouvelle inspiration

</button>


</div>


</div>


</div>








<!-- FOCUS -->


<div

class="tab-content hidden"

id="focusContent"

>


<div class="card">


<div class="focus-container">



<div

class="focus-ring"

id="focusRing"

>


<div class="focus-inner">


<div

class="focus-time"

id="focusTime"

>

25:00

</div>


</div>


</div>




<div class="focus-label">

Session profonde

</div>




<div class="focus-buttons">


<button

class="primary-button"

id="focusStart"

>

▶ Démarrer

</button>



<button

class="secondary-button"

id="focusReset"

>

↺ Recommencer

</button>


</div>


</div>


</div>


</div>








<style>


/* TABS */


.tabs{

display:flex;

background:var(--card);

border:1px solid var(--border);

border-radius:14px;

padding:4px;

margin-top:12px;

}



.tab{

flex:1;

border:none;

background:transparent;

padding:10px;

border-radius:11px;


font-size:13px;

color:var(--muted);

cursor:pointer;


}



.tab.active{

background:white;

color:var(--text);


box-shadow:

0 2px 8px rgba(0,0,0,.08);

}



@media(prefers-color-scheme:dark){

.tab.active{

background:#333;

}

}





.hidden{

display:none;

}







/* SPHERE */


.wisdom-container{

text-align:center;

}



.wisdom-sphere{

width:120px;

height:120px;

margin:5px auto 20px;


border-radius:50%;



background:

radial-gradient(
circle at 30% 25%,
white,
#f4f4f4,
#dddddd
);



box-shadow:

0 0 25px rgba(255,255,255,.9),

0 10px 25px rgba(0,0,0,.08);



position:relative;


animation:

floatSphere 5s infinite ease-in-out;

}



.sphere-light{

position:absolute;


width:30px;

height:30px;


top:20px;

left:28px;


border-radius:50%;


background:white;


filter:blur(4px);


}



@keyframes floatSphere{


50%{

transform:translateY(-8px);

}


}





.wisdom-text{

font-size:14px;

line-height:1.5;

}



.wisdom-author{

margin-top:8px;

margin-bottom:16px;

font-size:12px;

color:var(--muted);

}








/* FOCUS */


.focus-container{

text-align:center;

}



.focus-ring{

width:150px;

height:150px;

border-radius:50%;


margin:auto;



display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--blue) 0deg,
var(--border) 0deg
);


}



.focus-inner{

width:120px;

height:120px;

border-radius:50%;


background:var(--card);


display:flex;

align-items:center;

justify-content:center;


}



.focus-time{

font-size:27px;

font-weight:800;

}



.focus-label{

margin-top:12px;

font-size:13px;

color:var(--muted);

}



.focus-buttons{

display:flex;

justify-content:center;

gap:10px;

margin-top:18px;

}



button{

border:none;

cursor:pointer;

border-radius:12px;

padding:10px 15px;

font-size:13px;

}



.primary-button{

background:var(--blue);

color:white;

}



.secondary-button{

background:var(--border);

color:var(--text);

}



</style>



<!-- SUITE PARTIE 3 -->

<script>


// DATE


document.getElementById("date").innerText =

new Date().toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);







// ONGLET NAVIGATION


const wisdomTab =
document.getElementById(
"wisdomTab"
);


const focusTab =
document.getElementById(
"focusTab"
);


const wisdomContent =
document.getElementById(
"wisdomContent"
);


const focusContent =
document.getElementById(
"focusContent"
);



wisdomTab.onclick = ()=>{


wisdomTab.classList.add(
"active"
);


focusTab.classList.remove(
"active"
);



wisdomContent.classList.remove(
"hidden"
);


focusContent.classList.add(
"hidden"
);



};



focusTab.onclick = ()=>{


focusTab.classList.add(
"active"
);


wisdomTab.classList.remove(
"active"
);



focusContent.classList.remove(
"hidden"
);


wisdomContent.classList.add(
"hidden"
);



};









// ENERGIE


const energySlider =
document.getElementById(
"energySlider"
);


const energyScore =
document.getElementById(
"energyScore"
);


const energyRing =
document.getElementById(
"energyRing"
);


const energyMessage =
document.getElementById(
"energyMessage"
);





function updateEnergy(){


const value =
Number(
energySlider.value
);



energyScore.innerText =
value;



energyRing.style.background =

`
conic-gradient(
var(--green)
${value*10}%,
var(--border)
0
)
`;



if(value<=3){

energyMessage.innerText =
"🌙 Besoin de repos";

}

else if(value<=6){

energyMessage.innerText =
"🌿 Énergie stable";

}

else if(value<=8){

energyMessage.innerText =
"✨ Bonne dynamique";

}

else{

energyMessage.innerText =
"🔥 Pleine forme";

}



localStorage.setItem(
"energy",
value
);



}



energySlider.value =

localStorage.getItem(
"energy"
)
||7;



energySlider.addEventListener(
"input",
updateEnergy
);



updateEnergy();









// FOCUS TIMER



let focusTotal =
25*60;


let focusSeconds =
focusTotal;


let focusRunning =
false;



const focusTime =
document.getElementById(
"focusTime"
);


const focusRing =
document.getElementById(
"focusRing"
);


const focusStart =
document.getElementById(
"focusStart"
);


const focusReset =
document.getElementById(
"focusReset"
);





function updateFocus(){


let minutes =
Math.floor(
focusSeconds/60
);


let seconds =
focusSeconds%60;



focusTime.innerText =

minutes
+
":"
+
(seconds<10?"0":"")
+
seconds;



let progress =

(
(focusTotal-focusSeconds)
/
focusTotal
)
*
360;



focusRing.style.background =

`
conic-gradient(
var(--blue)
${progress}deg,
var(--border)
0
)
`;



}



setInterval(()=>{


if(
focusRunning &&
focusSeconds>0
){

focusSeconds--;

updateFocus();


}


},1000);





focusStart.onclick = ()=>{


focusRunning =
!focusRunning;



focusStart.innerText =

focusRunning
?
"⏸ Pause"
:
"▶ Démarrer";


};





focusReset.onclick = ()=>{


focusRunning=false;


focusSeconds=focusTotal;


focusStart.innerText =
"▶ Démarrer";


updateFocus();


};



updateFocus();









// CITATIONS


const quotes=[


[
"La simplicité est la sophistication suprême.",
"— Léonard de Vinci"
],


[
"La discipline est le pont entre les objectifs et les accomplissements.",
"— Jim Rohn"
],


[
"La meilleure façon de prédire l'avenir est de le créer.",
"— Peter Drucker"
],


[
"Nous sommes ce que nous faisons de manière répétée.",
"— Aristote"
],


[
"Le succès est la somme de petits efforts répétés chaque jour.",
"— Robert Collier"
]


];




const wisdomText =
document.getElementById(
"wisdomText"
);


const wisdomAuthor =
document.getElementById(
"wisdomAuthor"
);



document.getElementById(
"newWisdom"
)
.onclick = ()=>{


const quote =

quotes[
Math.floor(
Math.random()
*
quotes.length
)
];



wisdomText.style.opacity=0;



setTimeout(()=>{


wisdomText.innerText =
"“"+quote[0]+"”";


wisdomAuthor.innerText =
quote[1];



wisdomText.style.opacity=1;



},250);



};



</script>


</body>


</html>
