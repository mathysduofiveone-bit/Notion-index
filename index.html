<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui</title>


<style>

:root{

--text:#37352F;
--muted:#787774;

--card:#F7F6F3;
--border:#E9E9E7;

--green:#7A9E7E;
--blue:#5B8DEF;

--shadow:rgba(0,0,0,.035);

}


@media(prefers-color-scheme:dark){

:root{

--text:#F1F1EF;
--muted:#9B9A97;

--card:#202020;
--border:#333;

--green:#94B49F;

}

}



*{

box-sizing:border-box;

}



body{

margin:0;

background:transparent;

font-family:

Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:var(--text);

}



.container{

max-width:450px;

margin:auto;

padding:24px 16px 45px;

}




/* HEADER */


.title{

font-size:30px;

font-weight:800;

letter-spacing:-1.5px;

}



.header-info{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:8px;

font-size:14px;

color:var(--muted);

}



.weather{

display:flex;

align-items:center;

gap:5px;

}





/* CARDS */


.card{

background:var(--card);

border:1px solid var(--border);

border-radius:20px;

padding:18px;

margin-top:14px;

box-shadow:
0 6px 18px var(--shadow);

}



.card-title{

font-size:14px;

font-weight:700;

margin-bottom:18px;

}




/* ENERGY */


.energy-center{

text-align:center;

}



.energy-ring{

width:135px;

height:135px;

border-radius:50%;


margin:auto;


display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--green) 70%,
var(--border) 0
);


transition:.4s;

}



.energy-inner{

width:105px;

height:105px;

border-radius:50%;


background:var(--card);


display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}



.energy-score{

font-size:34px;

font-weight:800;

}



.energy-max{

font-size:12px;

color:var(--muted);

}



.energy-message{

margin-top:10px;

font-size:13px;

color:var(--muted);

}




.energy-slider{

margin-top:22px;

width:100%;

height:7px;

appearance:none;

border-radius:30px;


background:

linear-gradient(
90deg,
#94B49F,
#D4A72C,
#E07A5F
);

}



.energy-slider::-webkit-slider-thumb{

appearance:none;

width:22px;

height:22px;

border-radius:50%;


background:white;


border:

3px solid var(--green);


box-shadow:

0 3px 8px rgba(0,0,0,.15);

cursor:pointer;

}



.energy-labels{

display:flex;

justify-content:space-between;

margin-top:10px;

font-size:12px;

color:var(--muted);

}



</style>

</head>


<body>


<div class="container">


<div class="header">


<div class="title">

☀️ Aujourd'hui

</div>



<div class="header-info">


<div id="date">

Mercredi 22 juillet

</div>



<div class="weather">

<span>

☀️

</span>

<span>

24°C

</span>

</div>


</div>


</div>





<!-- ENERGIE -->


<div class="card">


<div class="card-title">

⚡ Mon énergie

</div>


<div class="energy-center">



<div 
class="energy-ring"
id="energyRing"
>


<div class="energy-inner">


<div 
class="energy-score"
id="energyScore"
>

7

</div>


<div class="energy-max">

/10

</div>


</div>


</div>



<div 
class="energy-message"
id="energyMessage"
>

✨ Bonne dynamique

</div>



<input

type="range"

min="1"

max="10"

value="7"

id="energySlider"

class="energy-slider"

>



<div class="energy-labels">


<span>

🌙 Repos

</span>


<span>

🌿 Équilibre

</span>


<span>

🔥 Forme

</span>


</div>


</div>


</div>



<!-- SUITE PARTIE 2 -->

<!-- SPHERE DE SAGESSE -->


<div class="card">


<div class="card-title">

✨ Sphère de sagesse

</div>



<div class="wisdom-container">



<div class="wisdom-sphere">


<div class="sphere-light">

</div>


</div>




<div 
class="wisdom-text"
id="wisdomText"
>

"La simplicité est la sophistication suprême."

</div>



<div 
class="wisdom-author"
id="wisdomAuthor"
>

— Léonard de Vinci

</div>




<button

class="secondary-button"

id="newWisdom"

>

Nouvelle inspiration

</button>


</div>


</div>







<!-- FOCUS -->


<div class="card">


<div class="card-title">

🧠 Focus

</div>



<div class="focus-container">



<div

class="focus-ring"

id="focusRing"

>


<div class="focus-inner">


<div

class="focus-time"

id="focusTime"

>

25:00

</div>


</div>


</div>



<div class="focus-label">

Session profonde

</div>




<div class="focus-buttons">


<button

class="primary-button"

id="focusStart"

>

▶ Démarrer

</button>



<button

class="secondary-button"

id="focusReset"

>

↺ Recommencer

</button>



</div>


</div>


</div>








<style>


/* SPHERE */


.wisdom-container{

text-align:center;

}



.wisdom-sphere{


width:120px;

height:120px;


margin:8px auto 22px;


border-radius:50%;



background:

radial-gradient(
circle at 30% 25%,
white,
rgba(255,255,255,.95),
#ededed
);



box-shadow:

0 0 25px rgba(255,255,255,.9),

0 12px 25px rgba(0,0,0,.08);



position:relative;


animation:

floatSphere 5s ease-in-out infinite;


}



.sphere-light{


position:absolute;


width:32px;

height:32px;


top:20px;

left:28px;


border-radius:50%;


background:white;


opacity:.8;


filter:blur(4px);


}



@keyframes floatSphere{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-8px);

}


}



.wisdom-text{

font-size:14px;

line-height:1.5;

}



.wisdom-author{

margin-top:8px;

margin-bottom:16px;

font-size:12px;

color:var(--muted);

}





/* FOCUS */


.focus-container{

text-align:center;

}



.focus-ring{

width:155px;

height:155px;

border-radius:50%;


margin:auto;



display:flex;

align-items:center;

justify-content:center;



background:

conic-gradient(
var(--blue) 0deg,
var(--border) 0deg
);



transition:.4s;

}



.focus-inner{

width:125px;

height:125px;

border-radius:50%;


background:var(--card);


display:flex;

align-items:center;

justify-content:center;


}



.focus-time{

font-size:28px;

font-weight:800;

}



.focus-label{

margin-top:14px;

font-size:13px;

color:var(--muted);

}



.focus-buttons{

display:flex;

justify-content:center;

gap:10px;

margin-top:18px;

}



button{

border:none;

border-radius:14px;

padding:11px 16px;

font-size:13px;

cursor:pointer;

}



.primary-button{

background:var(--blue);

color:white;

}



.secondary-button{

background:var(--border);

color:var(--text);

}



</style>



<!-- SUITE PARTIE 3 -->

<script>


// DATE AUTOMATIQUE


document.getElementById("date").innerText =

new Date().toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);





// ENERGIE


const energySlider =
document.getElementById("energySlider");


const energyScore =
document.getElementById("energyScore");


const energyRing =
document.getElementById("energyRing");


const energyMessage =
document.getElementById("energyMessage");




function updateEnergy(){


const value =
Number(
energySlider.value
);



energyScore.innerText =
value;



const progress =
value * 10;



energyRing.style.background =

`
conic-gradient(
var(--green)
${progress}%,
var(--border)
0
)
`;



if(value <=3){

energyMessage.innerText =
"🌙 Besoin de repos";

}

else if(value <=6){

energyMessage.innerText =
"🌿 Énergie stable";

}

else if(value <=8){

energyMessage.innerText =
"✨ Bonne dynamique";

}

else{

energyMessage.innerText =
"🔥 Pleine forme";

}



localStorage.setItem(
"energy",
value
);



}



energySlider.value =

localStorage.getItem(
"energy"
)
|| 7;



energySlider.addEventListener(
"input",
updateEnergy
);


updateEnergy();







// FOCUS TIMER


const focusTotal =
25 * 60;


let focusSeconds =
focusTotal;


let focusRunning =
false;



const focusTime =
document.getElementById(
"focusTime"
);


const focusRing =
document.getElementById(
"focusRing"
);



const focusStart =
document.getElementById(
"focusStart"
);


const focusReset =
document.getElementById(
"focusReset"
);





function updateFocus(){


const minutes =
Math.floor(
focusSeconds / 60
);



const seconds =
focusSeconds % 60;



focusTime.innerText =

minutes
+
":"
+
(seconds < 10 ? "0":"")
+
seconds;



const progress =

(
(focusTotal-focusSeconds)
/
focusTotal
)
*
360;



focusRing.style.background =

`
conic-gradient(
var(--blue)
${progress}deg,
var(--border)
0
)
`;



}



setInterval(()=>{


if(
focusRunning &&
focusSeconds > 0
){

focusSeconds--;

updateFocus();

}


},1000);





focusStart.onclick =
()=>{


focusRunning =
!focusRunning;



focusStart.innerText =

focusRunning

?

"⏸ Pause"

:

"▶ Démarrer";


};






focusReset.onclick =
()=>{


focusRunning=false;


focusSeconds=
focusTotal;


focusStart.innerText =
"▶ Démarrer";


updateFocus();


};




updateFocus();









// SPHERE DE SAGESSE


const wisdomList = [


{

text:
"La simplicité est la sophistication suprême.",

author:
"— Léonard de Vinci"

},


{

text:
"La discipline est le pont entre les objectifs et les accomplissements.",

author:
"— Jim Rohn"

},


{

text:
"Ce n'est pas la montagne que nous conquérons, mais nous-mêmes.",

author:
"— Edmund Hillary"

},


{

text:
"La meilleure façon de prédire l'avenir est de le créer.",

author:
"— Peter Drucker"

},


{

text:
"Nous sommes ce que nous faisons de manière répétée.",

author:
"— Aristote"

}


];




const wisdomText =
document.getElementById(
"wisdomText"
);


const wisdomAuthor =
document.getElementById(
"wisdomAuthor"
);



document.getElementById(
"newWisdom"
)
.onclick =
()=>{


const quote =

wisdomList[
Math.floor(
Math.random()
*
wisdomList.length
)
];



wisdomText.style.opacity=0;



setTimeout(()=>{


wisdomText.innerText =
"“"
+
quote.text
+
"”";


wisdomAuthor.innerText =
quote.author;



wisdomText.style.opacity=1;



},300);


};





</script>


</body>


</html>
