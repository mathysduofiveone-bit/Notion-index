<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aujourd'hui — Life Dashboard</title>


<style>

:root {

--text:#37352F;
--muted:#787774;

--card:#F7F6F3;
--border:#E9E9E7;

--green:#7A9E7E;
--green-soft:#B8D8BA;

--blue:#5B8DEF;

--orange:#D4A72C;

--shadow:rgba(0,0,0,.04);

}



@media(prefers-color-scheme:dark){

:root{

--text:#F1F1EF;
--muted:#9B9A97;

--card:#202020;
--border:#333;

--green:#94B49F;
--green-soft:#6B8F71;

--shadow:rgba(0,0,0,.25);

}

}



*{

box-sizing:border-box;

}



body{

margin:0;

background:transparent;

font-family:

Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:var(--text);

}



.container{

max-width:520px;

margin:auto;

padding:32px 20px 60px;

}



/* HEADER */


.header{

margin-bottom:28px;

}


.title{

font-size:34px;

font-weight:750;

letter-spacing:-1.5px;

}



.info-row{

display:flex;

justify-content:space-between;

align-items:center;

margin-top:10px;

color:var(--muted);

font-size:15px;

}



.weather{

display:flex;

align-items:center;

gap:6px;

}



.weather-icon{

font-size:20px;

}



/* CARDS */


.card{

background:var(--card);

border:1px solid var(--border);

border-radius:24px;

padding:24px;

margin-bottom:18px;

box-shadow:
0 12px 30px var(--shadow);

}



.card-title{

font-size:15px;

font-weight:700;

margin-bottom:22px;

}



/* ENERGY */


.energy-container{

text-align:center;

}



.energy-number{

font-size:46px;

font-weight:800;

letter-spacing:-2px;

}



.energy-message{

margin-top:5px;

font-size:14px;

color:var(--muted);

}



.energy-slider-container{

margin-top:28px;

position:relative;

}



.energy-slider{

width:100%;

appearance:none;

height:8px;

border-radius:20px;


background:

linear-gradient(
90deg,
#94B49F,
#D4A72C,
#E07A5F
);


outline:none;

}



.energy-slider::-webkit-slider-thumb{

appearance:none;

width:26px;

height:26px;

border-radius:50%;

background:white;

border:4px solid var(--green);

box-shadow:

0 4px 12px rgba(0,0,0,.15);

cursor:pointer;

}



.energy-labels{

display:flex;

justify-content:space-between;

margin-top:12px;

font-size:13px;

color:var(--muted);

}



.energy-labels span{

display:flex;

flex-direction:column;

gap:3px;

}





</style>

</head>



<body>


<div class="container">



<div class="header">


<div class="title">

☀️ Aujourd'hui

</div>



<div class="info-row">


<div id="date">

Mercredi 22 juillet

</div>



<div class="weather">


<span class="weather-icon">

☀️

</span>


<span>

24°C

</span>


</div>


</div>


</div>





<!-- ENERGIE -->


<div class="card">


<div class="card-title">

⚡ Mon énergie

</div>



<div class="energy-container">


<div class="energy-number" id="energyNumber">

7

</div>



<div class="energy-message" id="energyMessage">

✨ Bonne dynamique

</div>



<div class="energy-slider-container">


<input

type="range"

min="1"

max="10"

value="7"

class="energy-slider"

id="energySlider"

>



<div class="energy-labels">


<span>

🌙

Repos

</span>


<span>

🌿

Équilibre

</span>


<span>

🔥

Pleine forme

</span>


</div>


</div>


</div>


</div>


<!-- SUITE PARTIE 2 -->

<!-- FOCUS -->


<div class="card">


<div class="card-title">

🧠 Focus

</div>



<div class="focus-wrapper">


<div class="focus-circle" id="focusCircle">


<div class="focus-time" id="focusTime">

25:00

</div>


</div>



<div class="focus-subtitle">

Session profonde

</div>



<div class="focus-buttons">


<button 
class="primary-btn"
id="focusStart">

▶ Démarrer

</button>


<button 
class="secondary-btn"
id="focusReset">

↺ Recommencer

</button>


</div>


</div>


</div>





<!-- RAPPELS -->


<div class="card">


<div class="card-title">

🌱 Rappels essentiels

</div>



<div class="reminder-list">



<label class="reminder-item">

<input 
type="checkbox"
class="reminderCheck">

<span>

💧 Hydratation

</span>


</label>




<label class="reminder-item">

<input 
type="checkbox"
class="reminderCheck">

<span>

📖 Lecture

</span>


</label>





<label class="reminder-item">

<input 
type="checkbox"
class="reminderCheck">

<span>

🚶 Mouvement

</span>


</label>





<label class="reminder-item">

<input 
type="checkbox"
class="reminderCheck">

<span>

✍️ Habitudes

</span>


</label>



</div>



</div>







<!-- SPHERE DE SAGESSE -->


<div class="card">


<div class="card-title">

✨ Sphère de sagesse

</div>



<div class="sphere-section">



<div class="wisdom-sphere">


</div>



<div class="wisdom-text" id="wisdomText">


"La simplicité est la sophistication suprême."


</div>



<div class="wisdom-author" id="wisdomAuthor">


— Léonard de Vinci


</div>



<button

class="secondary-btn"

id="newWisdom">

Nouvelle inspiration

</button>



</div>


</div>







<style>


/* FOCUS */


.focus-wrapper{

text-align:center;

}



.focus-circle{

width:180px;

height:180px;

border-radius:50%;

margin:auto;


display:flex;

align-items:center;

justify-content:center;


background:

conic-gradient(
var(--blue) 0deg,
var(--border) 0deg
);


transition:.4s;

}



.focus-time{

width:145px;

height:145px;

border-radius:50%;

background:var(--card);


display:flex;

align-items:center;

justify-content:center;


font-size:34px;

font-weight:800;

}



.focus-subtitle{

margin-top:18px;

color:var(--muted);

font-size:14px;

}



.focus-buttons{

display:flex;

justify-content:center;

gap:12px;

margin-top:22px;

}



button{

border:none;

border-radius:15px;

padding:13px 18px;

font-size:14px;

cursor:pointer;

}



.primary-btn{

background:var(--blue);

color:white;

}



.secondary-btn{

background:var(--border);

color:var(--text);

}





/* RAPPELS */


.reminder-item{

display:flex;

align-items:center;

gap:12px;

padding:13px 0;

border-bottom:

1px solid var(--border);

cursor:pointer;

}



.reminder-item:last-child{

border-bottom:none;

}



.reminder-item input{

width:18px;

height:18px;

accent-color:var(--green);

}




/* SPHERE */


.sphere-section{

text-align:center;

}



.wisdom-sphere{

width:135px;

height:135px;

margin:10px auto 28px;


border-radius:50%;


background:

radial-gradient(
circle at 30% 25%,
rgba(255,255,255,.8),
transparent 30%
),

linear-gradient(
135deg,
#B8D8BA,
#7A9E7E
);



box-shadow:

0 0 50px rgba(122,158,126,.4);



animation:

sphereFloat 5s ease-in-out infinite;


}



@keyframes sphereFloat{


0%,100%{

transform:translateY(0);

}


50%{

transform:translateY(-14px);

}


}



.wisdom-text{

font-size:15px;

line-height:1.6;

}



.wisdom-author{

margin-top:12px;

color:var(--muted);

font-size:13px;

}



</style>


<!-- SUITE PARTIE 3 -->

<script>


// DATE


const dateElement =
document.getElementById("date");


dateElement.innerText =
new Date().toLocaleDateString(
"fr-FR",
{
weekday:"long",
day:"numeric",
month:"long"
}
);





// ENERGIE


const energySlider =
document.getElementById(
"energySlider"
);


const energyNumber =
document.getElementById(
"energyNumber"
);


const energyMessage =
document.getElementById(
"energyMessage"
);



function updateEnergy(){


const value =
energySlider.value;



energyNumber.innerText =
value;



if(value <= 3){

energyMessage.innerText =
"🌙 Besoin de repos";

}

else if(value <= 6){

energyMessage.innerText =
"🌿 Énergie stable";

}

else if(value <= 8){

energyMessage.innerText =
"✨ Bonne dynamique";

}

else{

energyMessage.innerText =
"🔥 Pleine forme";

}



localStorage.setItem(
"energyLevel",
value
);


}



energySlider.value =
localStorage.getItem(
"energyLevel"
)
|| 7;



energySlider.addEventListener(
"input",
updateEnergy
);



updateEnergy();







// RAPPELS


const reminders =
document.querySelectorAll(
".reminderCheck"
);



reminders.forEach(
(check,index)=>{


check.checked =
localStorage.getItem(
"reminder_"+index
)
==="true";



check.addEventListener(
"change",
()=>{


localStorage.setItem(
"reminder_"+index,
check.checked
);


});


});






// FOCUS TIMER


let focusDuration =
25*60;


let focusSeconds =
focusDuration;


let focusRunning =
false;



const focusTime =
document.getElementById(
"focusTime"
);


const focusStart =
document.getElementById(
"focusStart"
);


const focusReset =
document.getElementById(
"focusReset"
);


const focusCircle =
document.getElementById(
"focusCircle"
);





function updateFocus(){


let minutes =
Math.floor(
focusSeconds / 60
);


let seconds =
focusSeconds % 60;



focusTime.innerText =
minutes+
":"+
(seconds < 10 ? "0":"")
+
seconds;



let completed =
(
(focusDuration-focusSeconds)
/
focusDuration
)
*
360;



focusCircle.style.background =
`
conic-gradient(
var(--blue)
${completed}deg,
var(--border)
0
)
`;



}




setInterval(()=>{


if(
focusRunning &&
focusSeconds > 0
){

focusSeconds--;

updateFocus();


}


},1000);





focusStart.onclick =
()=>{


focusRunning =
!focusRunning;



focusStart.innerText =
focusRunning
?
"⏸ Pause"
:
"▶ Démarrer";


};





focusReset.onclick =
()=>{


focusRunning=false;


focusSeconds =
focusDuration;


focusStart.innerText =
"▶ Démarrer";


updateFocus();


};




updateFocus();







// SPHERE DE SAGESSE


const wisdoms = [


{
text:
"La simplicité est la sophistication suprême.",
author:
"— Léonard de Vinci"
},


{
text:
"La discipline est le pont entre les objectifs et les accomplissements.",
author:
"— Jim Rohn"
},


{
text:
"Ce que nous faisons chaque jour compte plus que ce que nous faisons parfois.",
author:
"— Gretchen Rubin"
},


{
text:
"La meilleure façon de prédire l'avenir est de le créer.",
author:
"— Peter Drucker"
},


{
text:
"Le succès est la somme de petits efforts répétés jour après jour.",
author:
"— Robert Collier"
}


];



const wisdomText =
document.getElementById(
"wisdomText"
);


const wisdomAuthor =
document.getElementById(
"wisdomAuthor"
);


const newWisdom =
document.getElementById(
"newWisdom"
);



newWisdom.onclick =
()=>{


let item =
wisdoms[
Math.floor(
Math.random()
*
wisdoms.length
)
];



wisdomText.style.opacity=0;



setTimeout(()=>{


wisdomText.innerText =
"“"+
item.text+
"”";


wisdomAuthor.innerText =
item.author;



wisdomText.style.opacity=1;



},300);



};





</script>


</body>

</html>
